/* ============================================================
   Gabon Connect — Design tokens
   Bleu institutionnel + filet tricolore Gabon
   ============================================================ */

:root {
  /* ---- Couleur primaire (USWDS-like institutional blue) ---- */
  --primary-50: #eff6fb;
  --primary-100: #d9e8f6;
  --primary-200: #aacdec;
  --primary-300: #73b3e7;
  --primary-400: #2378c3;
  --primary-500: #1a4480;
  --primary-600: #162e51;
  --primary-700: #0b2350;
  --primary-800: #061a3d;

  /* ---- Neutrals (cool gray, slight blue cast) ---- */
  --ink-900: #0e1a2b;
  --ink-800: #1c2a3e;
  --ink-700: #2c3a4f;
  --ink-600: #4a5876;
  --ink-500: #6b7a96;
  --ink-400: #92a0b8;
  --ink-300: #c5cdd9;
  --ink-200: #e1e6ee;
  --ink-150: #ebeff5;
  --ink-100: #f3f5f9;
  --ink-50:  #f8fafc;
  --ink-0:   #ffffff;

  /* ---- Semantic ---- */
  --success-50:  #ecf3ec;
  --success-100: #d8eed8;
  --success-500: #2e8540;
  --success-600: #1f6b30;
  --warning-50:  #fff5e0;
  --warning-100: #ffe8b9;
  --warning-500: #b88600;
  --warning-600: #8c6500;
  --danger-50:  #fbe9e9;
  --danger-100: #f8d7d7;
  --danger-500: #b50909;
  --danger-600: #8a0303;
  --info-50:  #eaf3fb;
  --info-100: #d4e6f7;
  --info-500: #1a4480;
  --info-600: #162e51;

  /* ---- Status archivistique (palette dédiée) ---- */
  --status-active: #1a4480;
  --status-active-bg: #eff6fb;
  --status-semi: #4a5876;
  --status-semi-bg: #ebeff5;
  --status-inactive: #6b7a96;
  --status-inactive-bg: #f3f5f9;
  --status-archived: #2e8540;
  --status-archived-bg: #ecf3ec;
  --status-destruct: #b88600;
  --status-destruct-bg: #fff5e0;
  --status-error: #b50909;
  --status-error-bg: #fbe9e9;

  /* ---- Élévations / radius ---- */
  --radius-xs: 2px;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;

  --shadow-xs: 0 1px 2px rgba(14, 26, 43, 0.05);
  --shadow-sm: 0 1px 3px rgba(14, 26, 43, 0.08), 0 1px 2px rgba(14, 26, 43, 0.04);
  --shadow-md: 0 4px 12px rgba(14, 26, 43, 0.08), 0 2px 4px rgba(14, 26, 43, 0.04);
  --shadow-lg: 0 12px 32px rgba(14, 26, 43, 0.12), 0 4px 12px rgba(14, 26, 43, 0.06);
  --shadow-focus: 0 0 0 3px rgba(35, 120, 195, 0.35);

  /* ---- Type ---- */
  --font-sans: 'Marianne', -apple-system, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  /* ---- Spacing (4px base) ---- */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;  --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;  --sp-10: 40px;
  --sp-12: 48px; --sp-16: 64px; --sp-20: 80px;
}

/* Reset minimal */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  color: var(--ink-900);
  background: var(--ink-100);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
h1, h2, h3, h4, h5, h6 { margin: 0; font-weight: 700; line-height: 1.2; color: var(--ink-900); }
p { margin: 0; }
button { font-family: inherit; cursor: pointer; }
a { color: var(--primary-500); text-decoration: none; }
a:hover { text-decoration: underline; }
input, textarea, select { font-family: inherit; }
:focus-visible { outline: none; box-shadow: var(--shadow-focus); border-radius: var(--radius-sm); }

@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Assistant IA — animations */
@keyframes gc-wave {
  0%   { transform: scaleY(0.35); }
  100% { transform: scaleY(1.05); }
}
@keyframes gc-ping {
  0%   { transform: scale(1);   opacity: 0.7; }
  80%  { transform: scale(1.35); opacity: 0; }
  100% { transform: scale(1.35); opacity: 0; }
}
@keyframes gc-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(35,120,195,.4); }
  50%      { box-shadow: 0 0 0 8px rgba(35,120,195,0); }
}
</style>
